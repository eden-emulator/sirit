name: CI

on:
  workflow_call:
    inputs:
      version:
        description: 'Sirit version'
        type: string
        default: 'test'

env:
  VERSION: "${{ inputs.version }}"

jobs:
  source:
    name: "Source Pack"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pack
        run: |
          VERSION=$(echo ${{ inputs.version }} | tr -d "v")

          pip install git-archive-all
          git-archive-all source.tar
          zstd -10 source.tar
          mv source.tar.zst sirit-source-$VERSION.tar.zst
          ./.ci/sums.sh sirit-source-$VERSION.tar.zst

          echo VERSION="$VERSION" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: sirit-source-${{ env.VERSION }}.tar.zst*

  desktop:
    name: "${{ matrix.platform }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: amd64
            msvc_arch: amd64
            platform: windows

          - os: windows-11-arm
            arch: arm64
            msvc_arch: amd64_arm64
            platform: windows

          - os: windows-latest
            arch: amd64
            platform: mingw
            msystem: mingw64

          - os: windows-11-arm
            arch: arm64
            platform: mingw
            msystem: clangarm64

          - os: ubuntu-latest
            arch: amd64
            platform: linux

          - os: ubuntu-24.04-arm
            arch: aarch64
            platform: linux

          - os: macos-latest
            arch: universal
            platform: macos

    defaults:
      run:
        shell: ${{ matrix.platform == 'mingw' && 'msys2 {0}' || 'bash {0}' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        if: matrix.platform == 'windows'
        with:
          arch: ${{ matrix.arch }}

      - name: Setup MSYS2
        id: msys2
        if: matrix.platform == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            git make tar curl cmake zstd
          pacboy: >-
            toolchain:p zstd:p

      - name: Configure
        run: |
          cmake -S . -B build -DSIRIT_BUILD_STATIC=ON -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PLATFORM=${{ matrix.platform }} ARCH=${{ matrix.arch }} ./.ci/package.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*

  android:
    name: "Android (${{ matrix.arch }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]

    env:
      PLATFORM: android
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: android-actions/setup-android@v3

      - name: Configure
        shell: bash
        run: |
          sdkmanager --install "cmake;3.31.6"

          case "$ARCH" in
            aarch64) ABI=arm64-v8a ;;
            x86_64)  ABI=x86_64 ;;
          esac

          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT \
            -DCMAKE_ANDROID_ARCH_ABI="${ABI}" \
            -DCMAKE_ANDROID_STL_TYPE=c++_shared \
            -G Ninja \
            -DSIRIT_BUILD_STATIC=ON \
            -S . -B build

      - name: Build
        shell: bash
        run: |
          cmake --build build -j$(nproc)

      - name: Package
        shell: bash
        run: |
          ./.ci/package.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: artifacts/*

  unix:
    name: "${{ matrix.platform }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: solaris
            runs-on: ubuntu-latest
            arch: amd64
            vm-arch: x86_64

          - platform: freebsd
            runs-on: ubuntu-latest
            arch: amd64
            vm-arch: x86_64

          - platform: openbsd
            runs-on: ubuntu-latest
            arch: amd64
            vm-arch: x86_64

    env:
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build (Solaris)
        if: matrix.platform == 'solaris'
        uses: vmactions/omnios-vm@v1
        with:
          arch: ${{ matrix.vm-arch }}
          release: "r151054"
          usesh: true
          envs: 'PLATFORM ARCH GITHUB_WORKSPACE VERSION'
          prepare: |
            pkg install cmake bash ninja gcc14 zstd
          run: |
            chmod a+x ./.ci/package.sh ./.ci/sums.sh
            cmake -S . -B build -DSIRIT_BUILD_STATIC=ON -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            ./.ci/package.sh

      - name: Build (FreeBSD)
        if: matrix.platform == 'freebsd'
        uses: vmactions/freebsd-vm@v1
        with:
          arch: ${{ matrix.vm-arch }}
          usesh: true
          envs: 'PLATFORM ARCH GITHUB_WORKSPACE VERSION'
          prepare: |
            pkg install -y cmake bash ninja
          run: |
            chmod a+x ./.ci/package.sh ./.ci/sums.sh
            cmake -S . -B build -DSIRIT_BUILD_STATIC=ON -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            ./.ci/package.sh

      - name: Build (OpenBSD)
        if: matrix.platform == 'openbsd'
        uses: vmactions/openbsd-vm@v1
        with:
          arch: ${{ matrix.vm-arch }}
          usesh: true
          release: "7.7"
          envs: 'PLATFORM ARCH GITHUB_WORKSPACE VERSION'
          prepare: |
            pkg_add -u
            pkg_add cmake ninja bash
          run: |
            chmod a+x ./.ci/package.sh ./.ci/sums.sh
            cmake -S . -B build -DSIRIT_BUILD_STATIC=ON -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            ./.ci/package.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*